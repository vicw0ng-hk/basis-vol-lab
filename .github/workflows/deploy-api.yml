name: deploy-api

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pyproject.toml"

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: build → ECR → Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_REGION: ap-east-1
      ECR_REPO: basis-vol-lab/api
      LAMBDA_FN: basis-vol-lab-api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        run: |
          ECR_URL="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}"
          echo "IMAGE_URI=${ECR_URL}:latest" >> "$GITHUB_ENV"
          echo "ECR_URL=${ECR_URL}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Lambda image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile.lambda
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_URL }}:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FN" \
            --image-uri "$IMAGE_URI" \
            --region "$AWS_REGION" > /dev/null
          echo "✓ Lambda updated: $LAMBDA_FN"

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FN" \
            --region "$AWS_REGION"
          echo "✓ Lambda active"
