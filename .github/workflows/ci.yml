name: ci

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  lint:
    name: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - name: Check formatting
        run: uvx ruff format --check .

      - name: Run ruff
        run: uvx ruff check .

      - name: Install workspace
        run: uv sync

      - name: Run pyright
        run: uvx pyright

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest
