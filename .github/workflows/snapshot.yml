name: snapshot

# NOTE: GitHub Actions scheduled workflows on free-tier repos run on a
# best-effort basis. The */15 cron often fires once every 1-5 hours.
# The frontend handles this with a staleness indicator.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    name: snapshot → R2
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASIS_ARTIFACT_BACKEND: r2
      BASIS_R2_ENDPOINT: ${{ secrets.BASIS_R2_ENDPOINT }}
      BASIS_R2_BUCKET: ${{ secrets.BASIS_R2_BUCKET }}
      BASIS_R2_ACCESS_KEY_ID: ${{ secrets.BASIS_R2_ACCESS_KEY_ID }}
      BASIS_R2_SECRET_ACCESS_KEY: ${{ secrets.BASIS_R2_SECRET_ACCESS_KEY }}
      BASIS_PROXY_URLS: ${{ secrets.BASIS_PROXY_URLS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.14"

      - name: Install workspace (with cloud extras)
        run: uv sync --package basis-api --extra cloud

      - name: Pre-flight connectivity check
        run: |
          echo "--- Runner region ---"
          curl -s --max-time 5 https://ipinfo.io/json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"IP: {d.get('ip')} Region: {d.get('region')}, {d.get('country')}\")" || echo "(ipinfo unavailable)"
          echo "--- Deribit connectivity ---"
          curl -s --max-time 10 -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" https://www.deribit.com/api/v2/public/get_time || echo "FAILED"
          echo "--- Binance connectivity (direct) ---"
          curl -s --max-time 10 -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" https://fapi.binance.com/fapi/v1/ping || echo "FAILED"
          echo "--- Binance connectivity (proxy) ---"
          if [ -n "$BASIS_PROXY_URLS" ]; then
            PROXY_URL=$(echo "$BASIS_PROXY_URLS" | head -1)
            curl -s --max-time 15 --proxy "$PROXY_URL" -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" https://fapi.binance.com/fapi/v1/ping || echo "FAILED"
          else
            echo "(no proxy configured)"
          fi

      - name: Run snapshot
        run: uv run --package basis-api python -m basis_api.snapshot --backend r2
