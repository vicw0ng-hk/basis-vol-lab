# Wrangler binding for the Cloudflare D1 metadata database.
#
# Used **only** to apply schema migrations from
# `packages/persistence/migrations/` against the production D1
# instance provisioned by Terraform. The Python runtime
# (`D1MetadataStore`) talks to the D1 REST API directly and does not
# read this file.
#
# The `database_id` is a public UUID surfaced by
# `terraform -chdir=infra/terraform output d1_database_id` and by the
# Cloudflare dashboard — not a secret.
#
# Usage:
#
#     export CLOUDFLARE_API_TOKEN=<token-with-D1:Edit-scope>
#     mise run d1:migrate         # applies pending migrations
#     mise run d1:migrate:list    # shows applied + pending
#
# `name` is required by wrangler v3+ even for non-Worker projects.

name = "basis-vol-lab-d1"
compatibility_date = "2026-04-01"

[[d1_databases]]
binding       = "DB"
database_name = "basis-vol-lab-meta"
database_id   = "30a3005e-86af-4c4c-a149-4c4b0eb055ee"
migrations_dir = "migrations"
