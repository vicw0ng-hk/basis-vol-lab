[env]
_.python.venv = { path = ".venv", create = true }
BASIS_AWS_REGION = "ap-east-1"
BASIS_ECR_REPO   = "basis-vol-lab/api"
BASIS_LAMBDA_FN  = "basis-vol-lab-api"

[tools]
node = "24"
python = "3.14"
terraform = "1.15"
wrangler = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.format]
description = "Format code with ruff"
run = "uvx ruff format ."

[tasks.lint]
description = "Lint code with ruff"
run = "uvx ruff check . --fix"

[tasks.typecheck]
description = "Type-check with pyright"
run = "uvx pyright"

[tasks.test]
description = "Run tests with pytest"
run = "uv run pytest"

[tasks.check]
description = "Run format, lint, typecheck, test, and terraform fmt+validate"
depends = ["format", "lint", "typecheck", "test", "tf:fmt", "tf:validate"]

[tasks."tf:fmt"]
description = "Format Terraform files under infra/terraform"
run = "terraform -chdir=infra/terraform fmt -recursive"

[tasks."tf:validate"]
description = "Validate the Terraform skeleton (no backend init required)"
run = """
terraform -chdir=infra/terraform init -backend=false -input=false
terraform -chdir=infra/terraform validate
"""

[tasks.deploy]
description = "Reminder: infra deploys are VCS-driven via HCP Terraform; push to master and approve in the TFC UI."
run = """
echo "Infra is deployed by HCP Terraform on push to master."
echo "  • Plans:  https://app.terraform.io/app/vsh852/workspaces/basis-vol-lab/runs"
echo "  • Approve there; do not run \\`terraform apply\\` locally."
"""

[tasks.collect]
description = "Smoke-run the Deribit collector (BTC, prints a few tickers)"
run = "uv run python -m basis_connectors.deribit --currency BTC --limit 5"

[tasks."collect:binance"]
description = "Smoke-run the Binance collector against live prod fstream"
run = "uv run python -m basis_connectors.binance --symbols BTCUSDT ETHUSDT --limit 10"

[tasks.validate]
description = "Run the IV-validation report against live Deribit"
run = "uv run python -m basis_analytics --currency BTC"

[tasks.snapshot]
description = "Pull one Deribit + Binance snapshot and write curated JSON artifacts under data/"
run = "uv run python -m basis_api.snapshot --data-dir data"

[tasks.api]
description = "Run the FastAPI service (uvicorn) on :8000"
run = "uv run python -m basis_api --reload"

[tasks."web:install"]
description = "Install web (Vite/React) dependencies"
dir = "apps/web"
run = "npm install"

[tasks."web:dev"]
description = "Run the Vite dev server (proxies /api to localhost:8000)"
dir = "apps/web"
run = "npm run dev"

[tasks."build:web"]
description = "Build the static web bundle (apps/web/dist)"
dir = "apps/web"
run = "npm run build"

[tasks."compose:up"]
description = "Start the API + web stack via Docker Compose (works with OrbStack)"
run = "docker compose up --build"

[tasks."compose:down"]
description = "Stop the Docker Compose stack"
run = "docker compose down"

# ── AWS Lambda image lifecycle ─────────────────────────────────────────
#
# Infra is provisioned by HCP Terraform on push to master (VCS-driven
# workspace). The Phase C bootstrap is a two-step dance because
# `aws_lambda_function` cannot be created until an image already exists
# in ECR:
#
#   1. Merge the Phase C TF change with `var.lambda_image_pushed = false`
#      (the default). TFC creates ECR + IAM + log group only.
#   2. `mise run lambda:push` — build + push the first image to ECR.
#   3. Set the workspace variable `lambda_image_pushed = true` in the
#      HCP Terraform UI and queue a new plan. TFC creates the Lambda,
#      the API Gateway, and updates the Pages `VITE_API_URL` env var.
#
# Subsequent code-only deploys are just `mise run lambda:push && mise
# run lambda:update`. Terraform's `lifecycle.ignore_changes = [image_uri]`
# keeps it from fighting `update-function-code`.
#
# All three tasks need local AWS credentials (`aws sso login` or
# equivalent) and Docker buildx — TFC is *not* in the loop.

[tasks."lambda:build"]
description = "Build the Lambda container image (arm64) for apps/api"
run = """
set -e
ACCT=$(aws sts get-caller-identity --query Account --output text)
ECR_URL="$ACCT.dkr.ecr.$BASIS_AWS_REGION.amazonaws.com/$BASIS_ECR_REPO"
docker buildx build \\
    --platform=linux/arm64 \\
    -f apps/api/Dockerfile.lambda \\
    -t "$ECR_URL:latest" \\
    --load .
"""

[tasks."lambda:push"]
description = "Build and push the Lambda image to ECR"
depends = ["lambda:build"]
run = """
set -e
ACCT=$(aws sts get-caller-identity --query Account --output text)
ECR_URL="$ACCT.dkr.ecr.$BASIS_AWS_REGION.amazonaws.com/$BASIS_ECR_REPO"
aws ecr get-login-password --region "$BASIS_AWS_REGION" \\
    | docker login --username AWS --password-stdin "$ACCT.dkr.ecr.$BASIS_AWS_REGION.amazonaws.com"
docker push "$ECR_URL:latest"
"""

[tasks."lambda:update"]
description = "Point the live Lambda at the latest ECR image"
run = """
set -e
ACCT=$(aws sts get-caller-identity --query Account --output text)
ECR_URL="$ACCT.dkr.ecr.$BASIS_AWS_REGION.amazonaws.com/$BASIS_ECR_REPO"
aws lambda update-function-code \\
    --function-name "$BASIS_LAMBDA_FN" \\
    --image-uri "$ECR_URL:latest" \\
    --region "$BASIS_AWS_REGION" >/dev/null
echo "lambda updated: $BASIS_LAMBDA_FN"
"""
